    <!-- Intro Overlay -->
    <div id="intro-overlay">
        <div id="stake-screen" class="intro-screen">
            <div class="gamelogo-container">
                <div id="stake-loader"></div>
                <img id="paradice-logo" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiBmaWxsPSIjMkM1OTNBIi8+Cjx0ZXh0IHg9IjEwMCIgeT0iMTAwIiBmb250LWZhbWlseT0iTGlsaXRhIE9uZSIgZm9udC1zaXplPSIyNCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5TTE9UIEdBTUU8L3RleHQ+Cjwvc3ZnPg==" alt="Slot Game Logo">
            </div>
        </div>
        
        <div id="gamelogo-screen" class="intro-screen">
            <div class="gamelogo-container">
                <img id="game-logo" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjE1MCIgdmlld0JveD0iMCAwIDMwMCAxNTAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIzMDAiIGhlaWdodD0iMTUwIiBmaWxsPSIjMkM1OTNBIi8+Cjx0ZXh0IHg9IjE1MCIgeT0iNzUiIGZvbnQtZmFtaWx5PSJMaWxpdGEgT25lIiBmb250LXNpemU9IjI4IiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkRFTU8gU0xPVDwvdGV4dD4KPC9zdmc+" alt="Demo Slot Logo">
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" style="display: none;">
        <!-- Volume Button -->
        <button id="volume-btn" class="volume-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 10v4h4l5 5V5L7 10H3z"/>
            </svg>
        </button>
        
        <!-- Game Message -->
        <div id="game-message" class="game-message"></div>
        
        <!-- Game UI -->
        <div class="game-container">
            <!-- Canvas holder -->
            <div id="sketch-holder"></div>
            
            <!-- Game UI Overlay -->
            <div class="game-ui">
                <!-- Balance Display -->
                <div class="balance-display">
                    <span class="balance-label">Balance:</span>
                    <span id="balance-value">$10.00</span>
                </div>
                
                <!-- Bet Controls -->
                <div class="bet-controls">
                    <button id="bet-down" class="bet-btn">-</button>
                    <span id="bet-value">$0.10</span>
                    <button id="bet-up" class="bet-btn">+</button>
                </div>
                
                <!-- Play Button -->
                <button id="play-button" class="play-btn">PLAY</button>
                
                <!-- Payout Display -->
                <div class="payout-display">
                    <span class="payout-label">Payout:</span>
                    <span id="payout-value">$0.00</span>
                </div>
                
                <!-- Multiplier Display -->
                <div id="multiplier-container" class="multiplier-container">
                    <span class="multiplier-label">Multiplier:</span>
                    <span id="multiplier-value">1.00x</span>
                </div>
                
                <!-- Turbo Button -->
                <button id="turbo-btn" class="turbo-btn" title="Turbo Mode">
                    <img id="turbo-icon" src="assets/turbo_innactive.png" alt="Turbo">
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="p5.min.js"></script>
    <script src="translations.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
